name: update

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Run update script
        run: ./scripts/update.sh
      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update claudezilla"
          title: "chore: update claudezilla"
          body: |
            Automated weekly bump of the claudezilla native host (upstream `main`)
            and the AMO Firefox extension xpi.
          branch: chore/update-claudezilla
          labels: |
            dependencies
            automated
          delete-branch: true
